# NIO HTTP Server Configuration
# 服务器配置示例

# 服务器基础配置
server.host=0.0.0.0
server.port=8080

# 线程配置
server.bossThreads=1
server.workerThreads=4

# 连接管理
server.maxConnections=10000
server.backlogSize=1024

# Socket 缓冲区配置（单位：字节）
server.receiveBufferSize=131072
server.sendBufferSize=131072

# TCP 参数优化
server.tcpNoDelay=true
server.soKeepAlive=true
server.soReuseAddr=true
server.soLinger=-1

# 写队列容量
server.writeQueueCapacity=100

# Socket 超时（毫秒，0 表示无超时）
server.socketTimeout=0

# 请求大小限制
server.maxHeaderSize=65536
server.maxBodySize=10485760

# HTTPS（配置 keystore 后将启用 TLS）
ssl.enabled=false
# ssl.keyStorePath=server.p12
# ssl.keyStorePassword=changeit

# 响应压缩
compression.enabled=true
compression.minSize=512

# 静态文件
static.welcomeFiles=index.html,index.htm
# mime.typesFile=mime.types

# TCP Keep-Alive 参数（仅适用于支持的平台）
server.tcpKeepAlive=true
server.tcpKeepIdle=7200
server.tcpKeepInterval=75
server.tcpKeepCount=9
