<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Index of {{path}}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #f5f6fa;
            color: #2c3e50;
            line-height: 1.6;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            overflow: hidden;
        }
        header {
            background: #3498db;
            color: #fff;
            padding: 20px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }
        header h1 {
            font-size: 1.25rem;
            font-weight: 500;
        }
        .breadcrumb a {
            color: #fff;
            text-decoration: none;
            opacity: 0.9;
        }
        .breadcrumb a:hover {
            text-decoration: underline;
            opacity: 1;
        }
        .breadcrumb span {
            opacity: 0.75;
        }
        .breadcrumb .sep {
            margin: 0 2px;
            opacity: 0.6;
        }
        .toolbar {
            padding: 16px 24px;
            background: #fafbfc;
            border-bottom: 1px solid #e1e4e8;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }
        .btn {
            padding: 8px 16px;
            border: 1px solid #d0d7de;
            background: #fff;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.875rem;
            transition: all 0.2s;
            color: #24292f;
        }
        .btn:hover {
            background: #f3f4f6;
            border-color: #bbb;
        }
        .btn-primary {
            background: #3498db;
            color: #fff;
            border-color: #3498db;
        }
        .btn-primary:hover {
            background: #2980b9;
        }
        .btn-danger {
            background: #e74c3c;
            color: #fff;
            border-color: #e74c3c;
        }
        .btn-danger:hover {
            background: #c0392b;
        }
        input[type="file"] { display: none; }
        .drop-zone {
            border: 2px dashed #d0d7de;
            border-radius: 6px;
            padding: 12px 16px;
            text-align: center;
            color: #57606a;
            font-size: 0.875rem;
            transition: all 0.2s;
            flex: 1;
            min-width: 200px;
        }
        .drop-zone.dragover {
            border-color: #3498db;
            background: #f0f7ff;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px 24px;
            text-align: left;
            border-bottom: 1px solid #e1e4e8;
        }
        th {
            background: #f6f8fa;
            font-weight: 600;
            font-size: 0.875rem;
            color: #57606a;
        }
        td {
            font-size: 0.875rem;
        }
        tr:hover {
            background: #f6f8fa;
        }
        a {
            color: #0969da;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
        .icon {
            display: inline-block;
            width: 20px;
            text-align: center;
            margin-right: 6px;
        }
        .size { text-align: right; }
        .actions { text-align: right; white-space: nowrap; }
        .actions button {
            margin-left: 4px;
            padding: 4px 10px;
            font-size: 0.75rem;
        }
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.4);
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal {
            background: #fff;
            padding: 24px;
            border-radius: 8px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }
        .modal h3 {
            margin-bottom: 16px;
            font-size: 1.1rem;
        }
        .modal input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #d0d7de;
            border-radius: 6px;
            margin-bottom: 16px;
            font-size: 0.875rem;
        }
        .modal .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
        }
        .empty-state {
            padding: 48px;
            text-align: center;
            color: #57606a;
        }
        @media (max-width: 768px) {
            th, td { padding: 10px 12px; }
            .toolbar { flex-direction: column; align-items: stretch; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📁 Index of <span class="breadcrumb">{{breadcrumb}}</span></h1>
        </header>
        <div class="toolbar">
            <button class="btn btn-primary" onclick="document.getElementById('fileInput').click()">⬆️ Upload Files</button>
            <button class="btn" onclick="showModal('mkdir')">📁 New Folder</button>
            <div class="drop-zone" id="dropZone">Drag &amp; drop files here to upload</div>
            <input type="file" id="fileInput" multiple onchange="uploadFiles(this.files)">
        </div>
        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th class="size">Size</th>
                    <th>Last Modified</th>
                    <th class="actions">Actions</th>
                </tr>
            </thead>
            <tbody>
                {{rows}}
            </tbody>
        </table>
    </div>

    <div class="modal-overlay" id="modal">
        <div class="modal">
            <h3 id="modalTitle">New Folder</h3>
            <input type="text" id="modalInput" placeholder="Enter name..." onkeydown="if(event.key==='Enter')modalConfirm()">
            <div class="modal-actions">
                <button class="btn" onclick="hideModal()">Cancel</button>
                <button class="btn btn-primary" onclick="modalConfirm()">Confirm</button>
            </div>
        </div>
    </div>

    <script>
        const currentPath = "{{path}}";
        let modalMode = '';
        let modalTarget = '';

        const dropZone = document.getElementById('dropZone');
        dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', e => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            uploadFiles(e.dataTransfer.files);
        });

        async function uploadFiles(files) {
            if (!files.length) return;
            const formData = new FormData();
            for (const file of files) formData.append('file', file);
            try {
                const res = await fetch(currentPath, { method: 'POST', body: formData });
                const text = await res.text();
                if (res.ok) {
                    alert('Upload successful: ' + text);
                    location.reload();
                } else {
                    alert('Upload failed: ' + text);
                }
            } catch (e) {
                alert('Upload error: ' + e.message);
            }
        }

        async function deleteItem(name) {
            if (!confirm('Are you sure you want to delete "' + name + '"?')) return;
            try {
                const res = await fetch(currentPath + (currentPath.endsWith('/') ? '' : '/') + name, { method: 'DELETE' });
                if (res.ok) {
                    location.reload();
                } else {
                    alert('Delete failed: ' + await res.text());
                }
            } catch (e) {
                alert('Delete error: ' + e.message);
            }
        }

        function showModal(mode, target) {
            modalMode = mode;
            modalTarget = target || '';
            const modal = document.getElementById('modal');
            const title = document.getElementById('modalTitle');
            const input = document.getElementById('modalInput');
            modal.classList.add('active');
            if (mode === 'mkdir') {
                title.textContent = 'New Folder';
                input.placeholder = 'Folder name';
                input.value = '';
            } else if (mode === 'rename') {
                title.textContent = 'Rename';
                input.placeholder = 'New name';
                input.value = target;
            }
            input.focus();
        }

        function hideModal() {
            document.getElementById('modal').classList.remove('active');
        }

        async function modalConfirm() {
            const input = document.getElementById('modalInput');
            const name = input.value.trim();
            if (!name) return;
            hideModal();
            if (modalMode === 'mkdir') {
                try {
                    const res = await fetch(currentPath + (currentPath.endsWith('/') ? '' : '/') + name, { method: 'MKCOL' });
                    if (res.ok) {
                        location.reload();
                    } else {
                        alert('Failed: ' + await res.text());
                    }
                } catch (e) {
                    alert('Error: ' + e.message);
                }
            } else if (modalMode === 'rename') {
                const newName = name;
                const oldUrl = currentPath + (currentPath.endsWith('/') ? '' : '/') + modalTarget;
                const newUrl = currentPath + (currentPath.endsWith('/') ? '' : '/') + newName;
                try {
                    const res = await fetch(oldUrl, {
                        method: 'MOVE',
                        headers: { 'Destination': location.origin + newUrl }
                    });
                    if (res.ok) {
                        location.reload();
                    } else {
                        alert('Rename failed: ' + await res.text());
                    }
                } catch (e) {
                    alert('Rename error: ' + e.message);
                }
            }
        }
    </script>
</body>
</html>
